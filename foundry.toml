[profile.default]
bytecode_hash = "none"
evm_version = "cancun"
ffi = true
fs_permissions = [
  {access = "read-write", path = ".forge-snapshots/"},
  {access = "read", path = "context/"},
  {access = "read-write", path = "broadcast/"}
]
libs = ["lib"]
out = "out"
solc_version = "0.8.30"
src = "src"
via_ir = false
optimizer = true
optimizer_runs = 200

[profile.ci]
fuzz = { runs = 1024 }
invariant = { runs = 256, depth = 64, fail_on_revert = true }

[lint]
exclude_lints = ["screaming-snake-case-immutable", "screaming-snake-case-const"]
lint_on_build = false
