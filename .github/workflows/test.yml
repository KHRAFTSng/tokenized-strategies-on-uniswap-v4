name: CI

on:
  workflow_dispatch:
  push:
  pull_request:

env:
  FOUNDRY_PROFILE: ci

jobs:
  solidity:
    name: Foundry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Bootstrap
        run: bash scripts/bootstrap.sh

      - name: Build Contracts
        run: |
          forge --version
          forge build --sizes

      - name: Tests
        run: forge test -vv

      - name: Coverage (100% src contracts)
        run: bash scripts/check_coverage.sh

      - name: Verify Dependencies
        run: bash scripts/verify_deps.sh

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build
        run: npm --workspace frontend run build
